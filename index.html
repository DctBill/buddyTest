<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buddy · 飞书网页</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #0f1419;
        color: #e6edf3;
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0;
      }
      #meta {
        font-size: 0.85rem;
        color: #8b949e;
        text-align: center;
        max-width: 36rem;
        padding: 0 1rem;
        line-height: 1.45;
      }
      /* 与 utils/theme.ts darkTheme + buddy/types RARITY_COLORS 对齐 */
      #sprite-panel {
        margin: 0;
        padding: 1.25rem 1.5rem;
        border-radius: 12px;
        background: #161b22;
        border: 1px solid #30363d;
        font-family:
          ui-monospace, "Cascadia Code", "SF Mono", Consolas, "Liberation Mono",
          Menlo, monospace;
        font-size: 14px;
        line-height: 1.15;
        letter-spacing: 0;
        tab-size: 4;
      }
      #sprite-heart {
        display: none;
        margin: 0 0 0.15em;
        white-space: pre;
        /* darkTheme.autoAccept — CompanionSprite 爱心行 color */
        color: rgb(175, 135, 255);
      }
      #sprite-heart.is-on {
        display: block;
      }
      #sprite-body {
        margin: 0;
        white-space: pre;
        color: inherit;
      }
      .hint {
        max-width: 28rem;
        padding: 0 1rem;
        font-size: 0.85rem;
        color: #8b949e;
        text-align: center;
        line-height: 1.5;
      }
      .user-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.5rem 0.75rem;
        max-width: 32rem;
        padding: 0 1rem;
        font-size: 0.8rem;
        color: #8b949e;
      }
      .user-row input {
        min-width: 12rem;
        padding: 0.35rem 0.5rem;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #161b22;
        color: #e6edf3;
      }
      .user-row button {
        padding: 0.35rem 0.65rem;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #21262d;
        color: #e6edf3;
        cursor: pointer;
      }
      .user-row button:hover {
        border-color: #58a6ff;
      }
      .buddy-actions {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        padding: 0 1rem;
      }
      .buddy-actions button {
        min-height: 44px;
        padding: 0.5rem 1rem;
        border-radius: 10px;
        border: 1px solid #30363d;
        background: #21262d;
        color: #e6edf3;
        font-size: 1rem;
        cursor: pointer;
      }
      .buddy-actions button:active {
        background: #30363d;
      }
    </style>
  </head>
  <body>
    <h1>Buddy · 网页（与机器人同源 roll）</h1>
    <p id="meta" aria-live="polite"></p>
    <div class="buddy-actions">
      <button type="button" id="petBtn" title="与终端 /buddy pet 同款表现">
        抚摸
      </button>
    </div>
    <div id="sprite-panel" aria-live="polite">
      <div id="sprite-heart"></div>
      <pre id="sprite-body"></pre>
    </div>
    <div class="user-row">
      <label>
        用户键（与 <code>feishu-buddy-bot</code> 一致，一般为 open_id）：
        <input id="userKey" type="text" autocomplete="off" placeholder="留空则 anon 演示" />
      </label>
      <button type="button" id="saveUserKey">保存并刷新</button>
    </div>
    <p class="hint">
      构建：在 <code>feishu-buddy-web</code> 目录执行 <code>npm run build</code>，将本目录整包以
      <strong>HTTPS</strong> 部署（需带上 <code>buddy-web.bundle.js</code>）。<code>?user=open_id</code> 与机器人一致；<code>?nonce=N</code> 与
      <code>重新孵化</code> 次数对齐（机器人会在配置了网页地址时发链接）。抚摸约 2.5s 爱心 + 快速切帧。
    </p>
    <script type="module">
      import {
        roll,
        renderSprite,
        spriteFrameCount,
        RARITY_STARS,
        STAT_NAMES,
      } from "./buddy-web.bundle.js";

      // 与 buddy/CompanionSprite.tsx 一致
      const TICK_MS = 500;
      const PET_BURST_MS = 2500;
      const IDLE_SEQUENCE = [0, 0, 0, 0, 1, 0, 0, 0, -1, 0, 0, 2, 0, 0, 0];
      const H = "\u2665"; // figures.heart
      const PET_HEARTS = [
        `   ${H}    ${H}   `,
        `  ${H}  ${H}   ${H}  `,
        ` ${H}   ${H}  ${H}   `,
        `${H}  ${H}      ${H} `,
        "\xb7    \xb7   \xb7  ",
      ];

      const LS_KEY = "feishu-buddy-user-key";
      /** 按用户键存 bonesNonce，与 feishu-buddy-bot companion-souls.json 一致 */
      function nonceLsKey(rawKey) {
        return `feishu-buddy-bones-nonce:${rawKey}`;
      }
      const params = new URLSearchParams(location.search);
      const fromUrl = params.get("user")?.trim();
      const input = document.getElementById("userKey");
      const metaEl = document.getElementById("meta");
      const heartEl = document.getElementById("sprite-heart");
      const bodyEl = document.getElementById("sprite-body");

      /** darkTheme，与 types.RARITY_COLORS → Theme 键一致 */
      const RARITY_BODY_RGB = {
        common: "rgb(153, 153, 153)", // inactive
        uncommon: "rgb(78, 186, 101)", // success
        rare: "rgb(177, 185, 249)", // permission
        epic: "rgb(175, 135, 255)", // autoAccept
        legendary: "rgb(255, 193, 7)", // warning
      };

      let userKey = fromUrl || localStorage.getItem(LS_KEY) || "";
      input.value = userKey;

      function resolveBonesNonce(rawKey) {
        const q = params.get("nonce");
        if (q !== null && q !== "") {
          const n = parseInt(q, 10);
          if (Number.isFinite(n) && n >= 0) {
            localStorage.setItem(nonceLsKey(rawKey), String(n));
            return n;
          }
        }
        const s = localStorage.getItem(nonceLsKey(rawKey));
        if (s !== null) {
          const n = parseInt(s, 10);
          if (Number.isFinite(n) && n >= 0) return n;
        }
        return 0;
      }

      function applyBuddy() {
        const key = (fromUrl || input.value || "anon").trim() || "anon";
        const seed = `feishu:${key}`;
        const bonesNonce = resolveBonesNonce(key);
        const { bones } = roll(seed, bonesNonce);
        const frameCount = spriteFrameCount(bones.species);
        const statLine = STAT_NAMES.map(
          (n) => `${n.slice(0, 3)}:${bones.stats[n]}`,
        ).join("  ");
        metaEl.textContent = `${RARITY_STARS[bones.rarity]} ${bones.species} · ${statLine} · nonce ${bonesNonce}`;
        const bodyColor = RARITY_BODY_RGB[bones.rarity];

        let tick = 0;
        let petStartTick = null;

        function paint() {
          const petAge =
            petStartTick !== null ? tick - petStartTick : Number.POSITIVE_INFINITY;
          const petting = petAge * TICK_MS < PET_BURST_MS;

          let bodyLines;
          if (petting) {
            heartEl.textContent = PET_HEARTS[petAge % PET_HEARTS.length];
            heartEl.classList.add("is-on");
            const spriteFrame = tick % frameCount;
            bodyLines = renderSprite(bones, spriteFrame);
          } else {
            if (petStartTick !== null) petStartTick = null;
            heartEl.textContent = "";
            heartEl.classList.remove("is-on");
            const step = IDLE_SEQUENCE[tick % IDLE_SEQUENCE.length];
            let spriteFrame;
            let blink = false;
            if (step === -1) {
              spriteFrame = 0;
              blink = true;
            } else {
              spriteFrame = step % frameCount;
            }
            bodyLines = renderSprite(bones, spriteFrame);
            if (blink) {
              const eye = bones.eye;
              bodyLines = bodyLines.map((line) => line.split(eye).join("-"));
            }
          }

          bodyEl.style.color = bodyColor;
          bodyEl.textContent = bodyLines.join("\n");
        }

        document.getElementById("petBtn").onclick = () => {
          petStartTick = tick;
          paint();
        };

        function onTick() {
          paint();
          tick += 1;
        }
        onTick();
        return setInterval(onTick, TICK_MS);
      }

      let timer = applyBuddy();

      document.getElementById("saveUserKey").addEventListener("click", () => {
        const v = input.value.trim();
        if (v) localStorage.setItem(LS_KEY, v);
        else localStorage.removeItem(LS_KEY);
        location.reload();
      });
    </script>
  </body>
</html>
